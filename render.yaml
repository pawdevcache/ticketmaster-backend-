services:
  - type: web
    name: ticketmaster-api
    runtime: go
    plan: free
    region: singapore
    branch: main
    buildCommand: go build -o app ./cmd/server
    startCommand: ./app
    healthCheckPath: /health
    envVars:
      # Set the value in the Render dashboard — never commit a connection string.
      - key: MONGO_URI
        sync: false
      - key: DB_NAME
        value: ticketmaster
